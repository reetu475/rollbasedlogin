spring.application.name=rollbasedlogin
server.port=${PORT:9090}

# Database Configuration (Render env vars with local fallbacks)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/rollbasedlogin?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000

# Thymeleaf Configuration - Disable template checking
spring.thymeleaf.check-template-location=false
spring.thymeleaf.enabled=false

# CORS Configuration - More permissive for development
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=false
spring.web.cors.max-age=3600

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# Eden AI Configuration for Resume Parsing
edenai.api.url=https://api.edenai.run/v2/ocr/resume_parser
edenai.similarity.url=https://api.edenai.run/v2/text/similarity
edenai.extraction.url=https://api.edenai.run/v2/ocr/resume_parser

# Hugging Face AI Configuration - Updated for working models
edenai.api.key=${EDENAI_API_KEY}
huggingface.api.key=${HF_API_KEY}
huggingface.api.url=https://router.huggingface.co/models/BAAI/bge-small-en-v1.5
huggingface.extraction.url=https://router.huggingface.co/models/santoshtalluri/resume-parser-enhanced

# Logging Configuration
logging.level.com.example.rollbasedlogin=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=ERROR